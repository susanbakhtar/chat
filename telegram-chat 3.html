<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>چت</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      input,
      textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Tahoma, sans-serif;
        background: #0e1621;
        overscroll-behavior: none;
      }
      #app {
        max-width: 460px;
        margin: 0 auto;
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        background: #0e1621;
        position: relative;
        overflow: hidden;
      }
      .screen {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        background: #0e1621;
      }
      .screen.active {
        display: flex;
      }

      /* ---------- Shared header ---------- */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
        background: #17212b;
        border-bottom: 1px solid #0b1218;
        flex-shrink: 0;
      }
      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: #4ea4f6;
        font-size: 22px;
        line-height: 1;
        width: 30px;
        height: 30px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .header-title {
        flex: 1;
        font-size: 17px;
        font-weight: 600;
        color: #fff;
        text-align: center;
      }

      /* ---------- List screen ---------- */
      .chat-list {
        flex: 1;
        overflow-y: auto;
      }
      .chat-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        cursor: pointer;
        position: relative;
        border-bottom: 1px solid #17212b;
      }
      .chat-row:active {
        background: #17212b;
      }
      .avatar {
        border-radius: 50%;
        background: linear-gradient(135deg, #5a7dbb, #3b5e91);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        color: #fff;
        font-weight: 600;
        flex-shrink: 0;
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .chat-row .avatar {
        width: 50px;
        height: 50px;
        font-size: 19px;
      }
      .chat-row-info {
        flex: 1;
        min-width: 0;
        text-align: right;
      }
      .chat-row-name {
        font-size: 16px;
        color: #fff;
        font-weight: 500;
      }
      .chat-row-preview {
        font-size: 13.5px;
        color: #6c7883;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .chat-row-time {
        font-size: 12px;
        color: #6c7883;
        flex-shrink: 0;
        align-self: flex-start;
        margin-top: 2px;
      }
      .chat-del {
        background: #e5534b;
        color: #fff;
        border: none;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        font-size: 13px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .empty-list {
        margin: auto;
        text-align: center;
        color: #4b5866;
        font-size: 14px;
        padding: 40px;
        line-height: 1.9;
      }
      .fab {
        position: absolute;
        bottom: calc(20px + env(safe-area-inset-bottom));
        left: 20px;
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: #4ea4f6;
        color: #fff;
        font-size: 26px;
        border: none;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
        cursor: pointer;
      }
      .fab:disabled {
        background: #2c3b48;
        color: #5a6874;
      }
      .list-hint {
        text-align: center;
        color: #4b5866;
        font-size: 12px;
        padding: 8px 20px 4px;
      }

      /* ---------- Chat screen ---------- */
      .chat-header-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        background: none;
        border: none;
        cursor: pointer;
        flex: 1;
        min-width: 0;
        padding: 2px 0;
      }
      .header .avatar {
        width: 40px;
        height: 40px;
        font-size: 15px;
      }
      .header-text {
        text-align: right;
        min-width: 0;
      }
      .header-name {
        font-size: 15.5px;
        font-weight: 600;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .header-status {
        font-size: 12px;
        color: #6c7883;
        margin-top: 1px;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px 10px 10px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .empty-state {
        margin: auto;
        text-align: center;
        color: #4b5866;
        font-size: 14px;
        padding: 40px 20px;
        line-height: 1.9;
      }
      .row {
        display: flex;
        align-items: flex-end;
        width: 100%;
        margin: 3px 0;
        gap: 6px;
      }
      .row.me {
        justify-content: flex-start;
      }
      .row.them {
        justify-content: flex-end;
      }
      .row .avatar {
        width: 26px;
        height: 26px;
        font-size: 11px;
      }
      .bubble-wrap {
        max-width: 74%;
        display: flex;
        flex-direction: column;
      }
      .bubble {
        padding: 7px 10px 8px 10px;
        border-radius: 14px;
        font-size: 15px;
        line-height: 1.4;
        word-wrap: break-word;
        white-space: pre-wrap;
        position: relative;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.15);
      }
      .bubble.img-bubble {
        padding: 4px;
      }
      .bubble.img-bubble img {
        display: block;
        max-width: 100%;
        border-radius: 10px;
        max-height: 260px;
        object-fit: cover;
      }
      .bubble.audio-bubble {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        min-width: 170px;
      }
      .play-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .audio-track {
        flex: 1;
        height: 3px;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 2px;
        position: relative;
      }
      .audio-track-fill {
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        width: 0%;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 2px;
      }
      .audio-dur {
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.7);
        flex-shrink: 0;
      }
      .row.me .bubble {
        background: #182533;
        color: #e8edf2;
        border-bottom-right-radius: 4px;
      }
      .row.them .bubble {
        background: #2b5278;
        color: #eef4fb;
        border-bottom-left-radius: 4px;
      }
      .bubble-meta {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 3px;
        font-size: 11px;
        margin-top: 3px;
        user-select: none;
      }
      .row.me .bubble-meta {
        color: #6c7883;
      }
      .row.them .bubble-meta {
        color: rgba(255, 255, 255, 0.65);
      }
      .img-bubble .bubble-meta {
        position: absolute;
        bottom: 8px;
        left: 10px;
        background: rgba(0, 0, 0, 0.45);
        padding: 1px 6px;
        border-radius: 8px;
        color: #fff !important;
      }
      .date-divider {
        text-align: center;
        margin: 14px 0 8px;
      }
      .date-divider span {
        background: #182533;
        color: #8a97a3;
        font-size: 12px;
        padding: 4px 12px;
        border-radius: 10px;
      }
      .del-x {
        position: absolute;
        top: -7px;
        width: 17px;
        height: 17px;
        border-radius: 50%;
        background: #3a4652;
        color: #cfd8e0;
        font-size: 10px;
        line-height: 17px;
        text-align: center;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.15s;
        border: 1px solid #0e1621;
      }
      .row.me .del-x {
        left: -8px;
      }
      .row.them .del-x {
        right: -8px;
      }
      .row:hover .del-x,
      .row:active .del-x {
        opacity: 1;
      }

      /* ---------- Composer ---------- */
      .composer {
        background: #17212b;
        padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
        border-top: 1px solid #0b1218;
        flex-shrink: 0;
      }
      .sender-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
        justify-content: center;
      }
      .sender-toggle button {
        border: none;
        padding: 6px 16px;
        border-radius: 14px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        background: #202b36;
        color: #8a97a3;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .sender-toggle button .mini-avatar {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        overflow: hidden;
        background: #3b5e91;
        flex-shrink: 0;
      }
      .sender-toggle button .mini-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .sender-toggle button.active {
        color: #fff;
      }
      .sender-toggle button.active.me {
        background: #2b5278;
      }
      .sender-toggle button.active.them {
        background: #3b5e91;
      }
      .input-row {
        display: flex;
        align-items: flex-end;
        gap: 6px;
      }
      .msg-input {
        flex: 1;
        border: none;
        background: #242f3d;
        color: #fff;
        border-radius: 18px;
        padding: 10px 14px;
        font-size: 15px;
        resize: none;
        max-height: 100px;
        min-height: 20px;
        font-family: inherit;
        outline: none;
      }
      .msg-input::placeholder {
        color: #6c7883;
      }
      .round-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .send-btn {
        background: #4ea4f6;
      }
      .send-btn:disabled {
        background: #2c3b48;
        color: #5a6874;
      }
      .attach-btn {
        background: #242f3d;
        color: #8a97a3;
        font-size: 17px;
      }
      .mic-btn {
        background: #242f3d;
        color: #8a97a3;
        font-size: 15px;
      }
      .mic-btn.recording {
        background: #e5534b;
        color: #fff;
      }
      .recording-row {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 4px 6px;
      }
      .recording-row.active {
        display: flex;
      }
      .recording-row.active + .input-row {
        display: none;
      }
      .rec-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #e5534b;
        animation: blink 1s infinite;
        flex-shrink: 0;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }
      .rec-time {
        color: #fff;
        font-size: 14px;
        flex: 1;
      }
      .rec-cancel {
        background: #242f3d;
        color: #b8c2cc;
        border: none;
        padding: 7px 14px;
        border-radius: 14px;
        font-size: 13px;
        cursor: pointer;
      }
      .rec-stop {
        background: #4ea4f6;
        color: #fff;
        border: none;
        padding: 7px 14px;
        border-radius: 14px;
        font-size: 13px;
        cursor: pointer;
        font-weight: 600;
      }

      /* ---------- Modal ---------- */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: #17212b;
        border-radius: 14px;
        width: 300px;
        padding: 18px;
        text-align: center;
        border: 1px solid #202b36;
      }
      .modal h3 {
        margin: 0 0 14px;
        font-size: 16px;
        color: #fff;
        font-weight: 600;
      }
      .modal .avatar {
        width: 84px;
        height: 84px;
        margin: 0 auto 14px;
        font-size: 32px;
        cursor: pointer;
      }
      .modal input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: none;
        background: #242f3d;
        color: #fff;
        font-size: 15px;
        margin-bottom: 12px;
        text-align: center;
        font-family: inherit;
        outline: none;
      }
      .modal input[type="text"]::placeholder {
        color: #6c7883;
      }
      .modal-btns {
        display: flex;
        gap: 8px;
      }
      .modal-btns button {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .modal-btns .save {
        background: #4ea4f6;
        color: #fff;
      }
      .modal-btns .cancel {
        background: #242f3d;
        color: #b8c2cc;
      }
      .hidden-file {
        display: none;
      }
      .modal-hint {
        font-size: 12px;
        color: #6c7883;
        margin: -6px 0 12px;
      }
      .toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%);
        background: #242f3d;
        color: #fff;
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 13.5px;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        max-width: 80%;
        text-align: center;
      }
      .toast.show {
        opacity: 1;
      }
      .lightbox {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 80;
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox img {
        max-width: 92%;
        max-height: 92%;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ================= LIST SCREEN ================= -->
      <div class="screen active" id="listScreen">
        <div class="header">
          <button
            class="icon-btn"
            id="meAvatarBtn"
            title="عکس پروفایل خودت"
            style="order: 2"
          >
            <div
              class="avatar"
              id="meAvatarList"
              style="width: 32px; height: 32px; font-size: 12px"
            >
              من
            </div>
          </button>
          <div class="header-title" style="order: 1">چت‌ها</div>
          <div style="width: 30px; order: 0"></div>
        </div>
        <div class="chat-list" id="chatList"></div>
        <div class="list-hint" id="listHint"></div>
        <button class="fab" id="addChatBtn">＋</button>
      </div>

      <!-- ================= CHAT SCREEN ================= -->
      <div class="screen" id="chatScreen">
        <div class="header">
          <button class="icon-btn" id="backBtn">‹</button>
          <button class="chat-header-btn" id="contactBtn">
            <div class="avatar" id="contactAvatar">؟</div>
            <div class="header-text">
              <div class="header-name" id="contactNameDisplay">بدون نام</div>
              <div class="header-status">آخرین بازدید اخیرا</div>
            </div>
          </button>
        </div>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <div class="sender-toggle">
            <button id="btnAsMe" class="active me">
              <span class="mini-avatar" id="miniMe">م</span> پیام از طرف من
            </button>
            <button id="btnAsThem" class="them">
              <span class="mini-avatar" id="miniThem">؟</span> پیام از طرف او
            </button>
          </div>

          <div class="recording-row" id="recordingRow">
            <div class="rec-dot"></div>
            <div class="rec-time" id="recTime">0:00</div>
            <button class="rec-cancel" id="recCancelBtn">لغو</button>
            <button class="rec-stop" id="recStopBtn">ارسال</button>
          </div>

          <div class="input-row">
            <button class="round-btn attach-btn" id="attachBtn">📎</button>
            <textarea
              class="msg-input"
              id="msgInput"
              rows="1"
              placeholder="پیام..."
            ></textarea>
            <button class="round-btn mic-btn" id="micBtn">🎤</button>
            <button class="round-btn send-btn" id="sendBtn">➤</button>
          </div>
        </div>
      </div>
    </div>

    <input
      type="file"
      accept="image/*"
      class="hidden-file"
      id="imageFileInput"
    />

    <!-- Add / edit chat modal -->
    <div class="modal-overlay" id="contactModal">
      <div class="modal">
        <h3 id="contactModalTitle">مشخصات چت</h3>
        <div class="avatar" id="contactModalAvatar">؟</div>
        <div class="modal-hint">روی عکس بزن تا تغییرش بدی</div>
        <input
          type="file"
          accept="image/*"
          class="hidden-file"
          id="contactFileInput"
        />
        <input type="text" id="contactNameInput" placeholder="اسم" />
        <div class="modal-btns">
          <button class="cancel" id="contactCancelBtn">بستن</button>
          <button class="save" id="contactSaveBtn">ذخیره</button>
        </div>
      </div>
    </div>

    <!-- Me profile modal -->
    <div class="modal-overlay" id="meModal">
      <div class="modal">
        <h3>عکس پروفایل من</h3>
        <div class="avatar" id="meModalAvatar">من</div>
        <div class="modal-hint">روی عکس بزن تا تغییرش بدی</div>
        <input
          type="file"
          accept="image/*"
          class="hidden-file"
          id="meFileInput"
        />
        <input type="text" id="meNameInput" placeholder="اسم تو" />
        <div class="modal-btns">
          <button class="cancel" id="meCancelBtn">بستن</button>
          <button class="save" id="meSaveBtn">ذخیره</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="lightbox" id="lightbox"><img id="lightboxImg" /></div>

    <script>
      (function () {
        const $ = (id) => document.getElementById(id);
        const MAX_CHATS = 3;

        let me = { name: "من", photo: null };
        let chats = []; // {id, name, photo}
        let currentChatId = null;
        let currentMessages = [];
        let currentSender = "me";
        let tempPhoto = { contact: null, me: null };

        let mediaRecorder = null,
          recordedChunks = [],
          recordStart = 0,
          recordTimer = null;

        // ---------- Storage (real browser localStorage, persists on this device) ----------
        function lsGet(key, fallback) {
          try {
            const v = localStorage.getItem(key);
            return v ? JSON.parse(v) : fallback;
          } catch (e) {
            return fallback;
          }
        }
        function lsSet(key, value) {
          try {
            localStorage.setItem(key, JSON.stringify(value));
            return true;
          } catch (e) {
            showToast(
              "حافظه پر شده — یک پیام قدیمی (خصوصاً عکس یا ویس) رو حذف کن"
            );
            return false;
          }
        }

        function saveMe() {
          lsSet("tg_me", me);
        }
        function saveChats() {
          lsSet("tg_chats", chats);
        }
        function saveMessages() {
          lsSet("tg_msgs_" + currentChatId, currentMessages);
        }

        function loadAll() {
          me = lsGet("tg_me", { name: "من", photo: null });
          chats = lsGet("tg_chats", []);
          renderList();
        }

        // ---------- Helpers ----------
        function setAvatarEl(el, photo, fallbackLetter) {
          if (photo) el.innerHTML = '<img src="' + photo + '">';
          else {
            el.innerHTML = "";
            el.textContent = fallbackLetter || "؟";
          }
        }
        function showToast(msg) {
          const t = $("toast");
          t.textContent = msg;
          t.classList.add("show");
          clearTimeout(t._timer);
          t._timer = setTimeout(() => t.classList.remove("show"), 2600);
        }
        function uid() {
          return (
            "id_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7)
          );
        }
        function formatTime(ts) {
          return new Date(ts).toLocaleTimeString("fa-IR", {
            hour: "2-digit",
            minute: "2-digit",
          });
        }
        function formatDate(ts) {
          return new Date(ts).toLocaleDateString("fa-IR", {
            day: "numeric",
            month: "long",
            year: "numeric",
          });
        }
        function isSameDay(a, b) {
          const da = new Date(a),
            db = new Date(b);
          return (
            da.getFullYear() === db.getFullYear() &&
            da.getMonth() === db.getMonth() &&
            da.getDate() === db.getDate()
          );
        }

        function readFileAsDataURL(file) {
          return new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = reject;
            r.readAsDataURL(file);
          });
        }
        async function compressImage(dataUrl, maxSize) {
          maxSize = maxSize || 900;
          return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              let { width, height } = img;
              if (width > height) {
                if (width > maxSize) {
                  height *= maxSize / width;
                  width = maxSize;
                }
              } else {
                if (height > maxSize) {
                  width *= maxSize / height;
                  height = maxSize;
                }
              }
              const canvas = document.createElement("canvas");
              canvas.width = width;
              canvas.height = height;
              canvas.getContext("2d").drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL("image/jpeg", 0.82));
            };
            img.src = dataUrl;
          });
        }
        function blobToDataURL(blob) {
          return new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = reject;
            r.readAsDataURL(blob);
          });
        }

        // ================= LIST SCREEN =================
        function renderList() {
          setAvatarEl($("meAvatarList"), me.photo, (me.name || "من").charAt(0));
          const box = $("chatList");
          box.innerHTML = "";
          if (!chats.length) {
            box.innerHTML =
              '<div class="empty-list">هنوز چتی نساختی<br>با دکمه + یکی اضافه کن</div>';
          } else {
            chats.forEach((c) => {
              const msgs = lsGet("tg_msgs_" + c.id, []);
              const last = msgs.length ? msgs[msgs.length - 1] : null;
              let preview = "هنوز پیامی نیست";
              if (last) {
                if (last.type === "image") preview = "📷 عکس";
                else if (last.type === "audio") preview = "🎤 پیام صوتی";
                else preview = last.text;
              }
              const row = document.createElement("div");
              row.className = "chat-row";
              row.innerHTML =
                '<button class="chat-del" data-id="' +
                c.id +
                '">✕</button>' +
                '<div class="chat-row-info">' +
                '<div class="chat-row-name"></div>' +
                '<div class="chat-row-preview"></div>' +
                "</div>" +
                (last
                  ? '<div class="chat-row-time">' +
                    formatTime(last.ts) +
                    "</div>"
                  : '<div class="chat-row-time"></div>');
              const avatar = document.createElement("div");
              avatar.className = "avatar";
              setAvatarEl(avatar, c.photo, (c.name || "؟").charAt(0));
              row.insertBefore(avatar, row.firstChild);
              row.querySelector(".chat-row-name").textContent =
                c.name || "بدون نام";
              row.querySelector(".chat-row-preview").textContent = preview;
              row.addEventListener("click", (e) => {
                if (e.target.closest(".chat-del")) return;
                openChat(c.id);
              });
              row.querySelector(".chat-del").addEventListener("click", (e) => {
                e.stopPropagation();
                if (confirm("این چت و همه پیام‌هاش پاک بشه؟")) deleteChat(c.id);
              });
              box.appendChild(row);
            });
          }
          $("addChatBtn").disabled = chats.length >= MAX_CHATS;
          $("listHint").textContent =
            chats.length >= MAX_CHATS
              ? "حداکثر ۳ چت — یکی رو حذف کن تا بتونی چت جدید بسازی"
              : "";
        }

        function deleteChat(id) {
          chats = chats.filter((c) => c.id !== id);
          saveChats();
          localStorage.removeItem("tg_msgs_" + id);
          renderList();
        }

        $("addChatBtn").onclick = () => {
          if (chats.length >= MAX_CHATS) return;
          openContactModal(null); // null = new chat
        };

        $("meAvatarBtn").onclick = () => {
          tempPhoto.me = me.photo;
          setAvatarEl(
            $("meModalAvatar"),
            me.photo,
            (me.name || "من").charAt(0)
          );
          $("meNameInput").value = me.name || "";
          $("meModal").classList.add("open");
        };

        // ================= CHAT SCREEN =================
        function openChat(id) {
          currentChatId = id;
          currentMessages = lsGet("tg_msgs_" + id, []);
          renderChatHeader();
          renderMessages();
          $("listScreen").classList.remove("active");
          $("chatScreen").classList.add("active");
          setSender("me");
          $("msgInput").value = "";
        }

        function getCurrentChat() {
          return chats.find((c) => c.id === currentChatId);
        }

        function renderChatHeader() {
          const c = getCurrentChat();
          if (!c) return;
          setAvatarEl($("contactAvatar"), c.photo, (c.name || "؟").charAt(0));
          setAvatarEl($("miniThem"), c.photo, (c.name || "؟").charAt(0));
          setAvatarEl($("miniMe"), me.photo, (me.name || "م").charAt(0));
          $("contactNameDisplay").textContent = c.name || "بدون نام";
        }

        $("backBtn").onclick = () => {
          $("chatScreen").classList.remove("active");
          $("listScreen").classList.add("active");
          renderList();
        };

        function renderMessages() {
          const box = $("messages");
          box.innerHTML = "";
          if (!currentMessages.length) {
            box.innerHTML =
              '<div class="empty-state">هنوز پیامی نیست<br>اولین پیام رو بنویس</div>';
            return;
          }
          let lastDay = null;
          currentMessages.forEach((m) => {
            if (lastDay === null || !isSameDay(lastDay, m.ts)) {
              const dd = document.createElement("div");
              dd.className = "date-divider";
              dd.innerHTML = "<span>" + formatDate(m.ts) + "</span>";
              box.appendChild(dd);
            }
            lastDay = m.ts;

            const row = document.createElement("div");
            row.className = "row " + m.sender;

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            const profile = m.sender === "me" ? me : getCurrentChat();
            setAvatarEl(
              avatar,
              profile ? profile.photo : null,
              (
                (profile && profile.name) ||
                (m.sender === "me" ? "م" : "؟")
              ).charAt(0)
            );

            const wrap = document.createElement("div");
            wrap.className = "bubble-wrap";

            const bubble = document.createElement("div");
            bubble.className = "bubble";

            const del = document.createElement("div");
            del.className = "del-x";
            del.textContent = "✕";
            del.onclick = () => deleteMessage(m.id);
            bubble.appendChild(del);

            if (m.type === "image") {
              bubble.classList.add("img-bubble");
              const img = document.createElement("img");
              img.src = m.image;
              img.onclick = () => openLightbox(m.image);
              bubble.appendChild(img);
              if (m.text) {
                const cap = document.createElement("div");
                cap.style.padding = "6px 4px 0";
                cap.textContent = m.text;
                bubble.appendChild(cap);
              }
            } else if (m.type === "audio") {
              bubble.classList.add("audio-bubble");
              const playBtn = document.createElement("button");
              playBtn.className = "play-btn";
              playBtn.textContent = "▶";
              const track = document.createElement("div");
              track.className = "audio-track";
              const fill = document.createElement("div");
              fill.className = "audio-track-fill";
              track.appendChild(fill);
              const dur = document.createElement("div");
              dur.className = "audio-dur";
              dur.textContent = m.duration
                ? formatDuration(m.duration)
                : "0:00";
              const audioEl = new Audio(m.audio);
              playBtn.onclick = () => {
                if (audioEl.paused) {
                  audioEl.play();
                  playBtn.textContent = "⏸";
                } else {
                  audioEl.pause();
                  playBtn.textContent = "▶";
                }
              };
              audioEl.ontimeupdate = () => {
                if (audioEl.duration)
                  fill.style.width =
                    (audioEl.currentTime / audioEl.duration) * 100 + "%";
              };
              audioEl.onended = () => {
                playBtn.textContent = "▶";
                fill.style.width = "0%";
              };
              bubble.appendChild(playBtn);
              bubble.appendChild(track);
              bubble.appendChild(dur);
            } else {
              const span = document.createElement("span");
              span.textContent = m.text;
              bubble.appendChild(span);
            }

            const meta = document.createElement("div");
            meta.className = "bubble-meta";
            meta.innerHTML =
              formatTime(m.ts) + (m.sender === "me" ? " <span>✓✓</span>" : "");
            bubble.appendChild(meta);

            wrap.appendChild(bubble);
            if (m.sender === "me") {
              row.appendChild(avatar);
              row.appendChild(wrap);
            } else {
              row.appendChild(wrap);
              row.appendChild(avatar);
            }
            box.appendChild(row);
          });
          box.scrollTop = box.scrollHeight;
        }

        function formatDuration(sec) {
          sec = Math.round(sec);
          return Math.floor(sec / 60) + ":" + String(sec % 60).padStart(2, "0");
        }

        function deleteMessage(id) {
          currentMessages = currentMessages.filter((m) => m.id !== id);
          saveMessages();
          renderMessages();
        }

        function pushMessage(msg) {
          currentMessages.push(msg);
          saveMessages();
          renderMessages();
        }

        function setSender(s) {
          currentSender = s;
          $("btnAsMe").classList.toggle("active", s === "me");
          $("btnAsThem").classList.toggle("active", s === "them");
        }
        $("btnAsMe").onclick = () => setSender("me");
        $("btnAsThem").onclick = () => setSender("them");

        function autoGrow(el) {
          el.style.height = "auto";
          el.style.height = Math.min(el.scrollHeight, 100) + "px";
        }
        $("msgInput").addEventListener("input", (e) => autoGrow(e.target));
        $("msgInput").addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendText();
          }
        });
        $("sendBtn").onclick = sendText;

        function sendText() {
          const input = $("msgInput");
          const text = input.value.trim();
          if (!text) return;
          pushMessage({
            id: uid(),
            sender: currentSender,
            type: "text",
            text,
            ts: Date.now(),
          });
          input.value = "";
          autoGrow(input);
        }

        // ---------- Image sending ----------
        $("attachBtn").onclick = () => $("imageFileInput").click();
        $("imageFileInput").onchange = async (e) => {
          const file = e.target.files[0];
          e.target.value = "";
          if (!file) return;
          const raw = await readFileAsDataURL(file);
          const compressed = await compressImage(raw);
          const caption = $("msgInput").value.trim();
          pushMessage({
            id: uid(),
            sender: currentSender,
            type: "image",
            image: compressed,
            text: caption,
            ts: Date.now(),
          });
          $("msgInput").value = "";
          autoGrow($("msgInput"));
        };

        // ---------- Lightbox ----------
        function openLightbox(src) {
          $("lightboxImg").src = src;
          $("lightbox").classList.add("open");
        }
        $("lightbox").onclick = () => $("lightbox").classList.remove("open");

        // ---------- Voice recording ----------
        $("micBtn").onclick = async () => {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            showToast(
              "این مرورگر از ضبط صدا پشتیبانی نمی‌کنه. صفحه رو با Safari و به‌صورت آنلاین (https) باز کن."
            );
            return;
          }
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              audio: true,
            });
            recordedChunks = [];
            const mimeType = MediaRecorder.isTypeSupported("audio/mp4")
              ? "audio/mp4"
              : MediaRecorder.isTypeSupported("audio/webm")
              ? "audio/webm"
              : "";
            mediaRecorder = mimeType
              ? new MediaRecorder(stream, { mimeType })
              : new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => {
              if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = () => {
              stream.getTracks().forEach((t) => t.stop());
            };
            mediaRecorder.start();
            recordStart = Date.now();
            $("recordingRow").classList.add("active");
            $("recTime").textContent = "0:00";
            recordTimer = setInterval(() => {
              const sec = Math.floor((Date.now() - recordStart) / 1000);
              $("recTime").textContent = formatDuration(sec);
            }, 250);
          } catch (err) {
            showToast("اجازه دسترسی به میکروفون داده نشد.");
          }
        };

        $("recCancelBtn").onclick = () => finishRecording(true);
        $("recStopBtn").onclick = () => finishRecording(false);

        function finishRecording(cancel) {
          if (!mediaRecorder || mediaRecorder.state === "inactive") {
            resetRecordUI();
            return;
          }
          const duration = (Date.now() - recordStart) / 1000;
          mediaRecorder.addEventListener(
            "stop",
            async () => {
              resetRecordUI();
              if (cancel || duration < 0.6) return;
              const blob = new Blob(recordedChunks, {
                type: mediaRecorder.mimeType || "audio/webm",
              });
              const dataUrl = await blobToDataURL(blob);
              pushMessage({
                id: uid(),
                sender: currentSender,
                type: "audio",
                audio: dataUrl,
                duration,
                ts: Date.now(),
              });
            },
            { once: true }
          );
          mediaRecorder.stop();
        }
        function resetRecordUI() {
          clearInterval(recordTimer);
          $("recordingRow").classList.remove("active");
        }

        // ================= Contact / Me modals =================
        function openContactModal(chatId) {
          const editing = !!chatId;
          const c = editing
            ? chats.find((x) => x.id === chatId)
            : { name: "", photo: null };
          tempPhoto.contact = c.photo;
          $("contactModalTitle").textContent = editing
            ? "ویرایش چت"
            : "چت جدید";
          $("contactNameInput").value = c.name || "";
          setAvatarEl(
            $("contactModalAvatar"),
            c.photo,
            (c.name || "؟").charAt(0)
          );
          $("contactModal").dataset.editingId = editing ? chatId : "";
          $("contactModal").classList.add("open");
        }
        $("contactBtn").onclick = () => openContactModal(currentChatId);
        $("contactCancelBtn").onclick = () =>
          $("contactModal").classList.remove("open");
        $("contactModalAvatar").onclick = () => $("contactFileInput").click();
        $("contactFileInput").onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const raw = await readFileAsDataURL(file);
          const compressed = await compressImage(raw, 400);
          tempPhoto.contact = compressed;
          setAvatarEl($("contactModalAvatar"), compressed);
        };
        $("contactSaveBtn").onclick = () => {
          const name = $("contactNameInput").value.trim();
          const editingId = $("contactModal").dataset.editingId;
          if (editingId) {
            const c = chats.find((x) => x.id === editingId);
            c.name = name;
            c.photo = tempPhoto.contact;
            saveChats();
            renderChatHeader();
            renderMessages();
          } else {
            if (chats.length >= MAX_CHATS) {
              showToast("حداکثر ۳ چت مجازه");
              $("contactModal").classList.remove("open");
              return;
            }
            const newChat = { id: uid(), name, photo: tempPhoto.contact };
            chats.push(newChat);
            saveChats();
            renderList();
            openChat(newChat.id);
          }
          $("contactModal").classList.remove("open");
        };

        $("meCancelBtn").onclick = () => $("meModal").classList.remove("open");
        $("meModalAvatar").onclick = () => $("meFileInput").click();
        $("meFileInput").onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const raw = await readFileAsDataURL(file);
          const compressed = await compressImage(raw, 400);
          tempPhoto.me = compressed;
          setAvatarEl($("meModalAvatar"), compressed);
        };
        $("meSaveBtn").onclick = () => {
          me.name = $("meNameInput").value.trim() || "من";
          me.photo = tempPhoto.me;
          saveMe();
          renderList();
          renderChatHeader();
          renderMessages();
          $("meModal").classList.remove("open");
        };

        loadAll();
      })();
    </script>
  </body>
</html>
